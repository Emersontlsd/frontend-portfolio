<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow neon -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="#001C3D"></circle>

  <!-- Rocket -->
  <g transform="rotate(45 32 32)" filter="url(#glow)">
    
    <!-- Body -->
    <path d="
      M32 10
      C40 18, 40 28, 32 38
      C24 28, 24 18, 32 10
      Z
    " fill="#00F3FF" stroke="#00F3FF" stroke-width="1.5"></path>

    <!-- Lightning detail -->
    <path d="
      M32 16
      L36 26
      L30 26
      L34 36
      L28 28
      L34 28
      Z
    " fill="#001C3D"></path>

    <!-- Fins -->
    <path d="M25 34 L20 42 L28 38 Z" fill="#00F3FF"></path>
    <path d="M39 34 L44 42 L36 38 Z" fill="#00F3FF"></path>

    <!-- Flame -->
    <path d="
      M32 40
      C28 48, 36 50, 32 56
      C40 50, 36 46, 32 40
      Z
    " fill="#00F3FF" opacity="0.7"></path>
    
  </g>
</svg>